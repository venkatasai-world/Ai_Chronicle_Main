<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chronical - Fresh AI News Stories</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ff0000">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        background: #0a0a0a;
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      .home {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding-bottom: calc(env(safe-area-inset-bottom) + 120px);
      }

      .home-header {
        padding: 2.5rem 1rem 1.25rem 1rem;
        text-align: center;
        animation: fadeInDown 0.8s ease-out;
      }

      .hero-card {
        width: min(980px, 96vw);
        max-width: 980px;
        margin: 0 auto;
        margin-bottom: 1.5rem;
        border-radius: 32px;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(20px);
      }

      .hero-image {
        width: 100%;
        min-height: 280px;
        aspect-ratio: 16 / 10;
        object-fit: cover;
        display: block;
      }

      .hero-copy {
        padding: 1.75rem 1.5rem 1.75rem 1.5rem;
        text-align: center;
      }

      .hero-copy p {
        margin: 0;
        color: rgba(255,255,255,0.75);
        font-size: clamp(1rem, 2.4vw, 1.15rem);
        line-height: 1.7;
      }

      .home-title {
        font-size: clamp(2.4rem, 7vw, 3.8rem);
        font-weight: 900;
        letter-spacing: -1px;
        margin: 0;
        background: linear-gradient(135deg, #ffffff, #d6d6d6);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(255,255,255,0.12);
      }

      .home-subtitle {
        margin: 1rem auto 0 auto;
        color: rgba(255, 255, 255, 0.76);
        font-size: clamp(1rem, 2.6vw, 1.2rem);
        max-width: 38rem;
        line-height: 1.65;
      }

      .home-main {
        width: min(980px, 94vw);
        margin: 0 auto;
        padding: 0.5rem 0 3rem 0;
      }

      .feed-icon {
        width: 46px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: rgba(255,255,255,0.08);
        color: #ffffff;
        font-size: 1.2rem;
        margin-bottom: 1rem;
      }

      .feed-card {
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.12);
        transition: all 0.28s ease;
        border-radius: 24px;
        padding: 1.35rem 1.25rem;
        display: block;
        cursor: pointer;
        user-select: none;
        position: relative;
        overflow: hidden;
      }

      .feed-card:hover {
        transform: translateY(-3px);
        border-color: rgba(255,255,255,0.22);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
      }

      .btn-primary {
        background: linear-gradient(135deg, #815bff, #6b42ff);
        color: #fff;
        box-shadow: 0 20px 40px rgba(107, 66, 255, 0.26);
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 24px 50px rgba(107, 66, 255, 0.34);
      }

      .section-title {
        font-size: 0.95rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.65);
        margin: 1.6rem 0 0.9rem 0;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }

      /* Shimmer Loading Effect */
      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }

      .loading-shimmer {
        animation: shimmer 2s infinite;
        background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3), rgba(255,255,255,0.1));
        background-size: 1000px 100%;
      }

      .feed-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.9rem;
      }

      @media (max-width: 768px) {
        .feed-grid { grid-template-columns: 1fr; }
        .home-main { padding: 1.25rem 1rem 140px 1rem; }
        .feed-name { font-size: 1rem; }
        .feed-hint { font-size: 0.9rem; }
        .feed-card { border-radius: 20px; }
        .btn-primary { width: 100%; }
        .carousel-container { height: auto; }
      }

      .feed-card {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
        border-radius: 20px;
        padding: 1.5rem 1.25rem;
        display: block;
        cursor: pointer;
        user-select: none;
        position: relative;
        overflow: hidden;
      }

      .feed-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s;
      }

      .feed-card:hover::before {
        left: 100%;
      }

      .feed-card:hover {
        transform: translateY(-5px) scale(1.02);
        border-color: rgba(255, 255, 255, 0.25);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      }

      .feed-card.selected {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
        border-color: rgba(255, 255, 255, 0.3);
      }

      .feed-name {
        font-size: 1.1rem;
        font-weight: 800;
        margin: 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.95);
      }

      .feed-hint {
        margin: 0.4rem 0 0 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
      }

      .feed-radio {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      button,
      .btn-primary,
      .btn-loading {
        min-height: 50px;
        min-width: 50px;
        border: none;
        width: 100%;
        margin-top: 1.1rem;
        padding: 1rem 1.25rem;
        border-radius: 14px;
        font-size: 1.05rem;
        font-weight: 900;
        letter-spacing: 0.3px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #ffffff, #e0e0e0);
        color: #000;
        transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
        cursor: pointer;
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.18);
      }

      /* Notification System */
      .notification {
        position: fixed;
        bottom: 30px;
        right: 20px;
        background: rgba(255, 0, 0, 0.9);
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        font-weight: 600;
        z-index: 999;
        animation: slideInUp 0.5s ease-out;
        box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        display: none;
      }

      .notification.show {
        display: block;
      }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Button loading fill animation */
      .btn-loading {
        background-color: #000;
        color: #fff;
        position: relative;
        overflow: hidden;
        cursor: progress;
      }

      img {
        max-width: 100%;
        height: auto;
        object-fit: cover;
      }
      .btn-loading > span {
        position: relative;
        z-index: 2;
      }
      .btn-loading::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 100%;
        background-color: #fff;
        z-index: 1;
      }
      .btn-loading.btn-animate::after {
        animation: fillFromLeft 5s linear forwards;
      }
      @keyframes fillFromLeft {
        from { width: 0%; }
        to { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="home">
      <header class="home-header">
        <h1 class="home-title">AI CHRONICAL</h1>
        <p class="home-subtitle">AI-powered news stories with image + voice summaries</p>
      </header>

      <div class="hero-card">
        <img class="hero-image" src="https://cdn1.designhill.com/uploads/personal_designs/f81b2a1d75d01e35b2ac8c0f6a8ec78b-2c416b2862c7ee69bb206f1f424a49c915132857202186.png?ver=2.12.85" alt="AI news stories" loading="lazy" />
        <div class="hero-copy">
          <p>AI-powered news stories with image + voice summaries</p>
        </div>
      </div>

      <main class="home-main">
        <div class="section-title">Choose a feed to generate</div>

        <form id="generatorForm" action="/process" method="post" novalidate>
          <div class="feed-grid">
            {% for feed in rss_feeds %}
            <label class="feed-card" data-feed-card>
              <input type="radio" name="feed" value="{{ loop.index }}" class="feed-radio" required />
              <div class="feed-icon">📰</div>
              <p class="feed-name">{{ feed.name }}</p>
              <p class="feed-hint">Tap to select</p>
            </label>
            {% endfor %}
          </div>

          <button type="submit" disabled id="submitBtn" class="btn-primary">
            <span>Generate stories</span>
          </button>
        </form>
      </main>

      <div id="notification" class="notification"></div>
    </div>

    <script>
      // Notification System
      function showNotification(message, duration = 3000) {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.classList.add('show');
        setTimeout(() => {
          notification.classList.remove('show');
        }, duration);
      }

      // Check for cache stats on page load
      window.addEventListener('load', () => {
        fetch('/api/cache_stats')
          .then(res => res.json())
          .then(data => {
            if (data.cached_articles > 10) {
              showNotification('✨ Fresh stories ready! Duplicates filtered.', 2000);
            }
          })
          .catch(err => console.log('Cache stats unavailable'));
      });

      const form = document.getElementById("generatorForm");
      const submitBtn = document.getElementById("submitBtn");
      const cards = Array.from(document.querySelectorAll("[data-feed-card]"));

      document.querySelectorAll('input[type="radio"]').forEach((input) => {
        input.addEventListener("change", () => {
          submitBtn.disabled = false;
          cards.forEach((c) => c.classList.remove("selected"));
          const card = input.closest("[data-feed-card]");
          if (card) card.classList.add("selected");
        });
      });

      form.addEventListener("submit", (e) => {
        if (!form.checkValidity()) return;
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.classList.remove("btn-primary");
        submitBtn.classList.add("btn-loading", "btn-animate");
        submitBtn.querySelector("span").textContent = "Generating...";

        showNotification('🔄 Fetching fresh stories...', 5000);

        setTimeout(() => form.submit(), 5100);
      });
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}')
          .then(() => console.log("SW Registered"));
      }
    </script>
  </body>
</html>
