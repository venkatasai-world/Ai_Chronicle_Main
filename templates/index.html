<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chronical - Fresh AI News Stories</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ff0000">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
      body {
        margin: 0;
        background: #0a0a0a;
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .home {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .home-header {
        padding: 2.5rem 1rem 1.25rem 1rem;
        text-align: center;
        animation: fadeInDown 0.8s ease-out;
      }

      .home-hero {
        padding: 3rem 1rem 2rem 1rem;
        text-align: center;
        background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        border-bottom: 1px solid rgba(255,255,255,0.08);
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }

      .hero-title {
        font-family: 'Poppins', sans-serif;
        font-size: clamp(2.2rem, 8vw, 3.5rem);
        font-weight: 900;
        letter-spacing: -1px;
        margin: 0;
        background: linear-gradient(135deg, #ffffff 0%, #d4d4d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 20px rgba(255,255,255,0.12);
      }

      .hero-slogan {
        font-size: clamp(0.95rem, 3vw, 1.2rem);
        font-weight: 500;
        color: rgba(255,255,255,0.72);
        margin: 0.7rem auto 0 auto;
        letter-spacing: 0.5px;
        max-width: 34rem;
        line-height: 1.6;
        animation: fadeIn 1s ease-out 0.5s both;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .home-title {
        font-size: clamp(1.8rem, 6vw, 2.6rem);
        font-weight: 900;
        letter-spacing: 1px;
        margin: 0;
        background: linear-gradient(135deg, #ffffff 0%, #bdbdbd 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .home-subtitle {
        margin: 0.6rem 0 0 0;
        color: rgba(255, 255, 255, 0.75);
        font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      }

      /* 3D Carousel */
      .carousel-container {
        perspective: 1000px;
        width: 100%;
        height: clamp(260px, 55vw, 460px);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .carousel-track {
        transform-style: preserve-3d;
        transition: transform 1s;
        position: relative;
        width: clamp(220px, 60vw, 320px);
        height: clamp(240px, 70vw, 420px);
        margin: auto;
        will-change: transform;
      }

      .carousel-item {
        position: absolute;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        backface-visibility: hidden;
      }
      .carousel-item:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
      .carousel-item:nth-child(2) { transform: rotateY(120deg) translateZ(250px); }
      .carousel-item:nth-child(3) { transform: rotateY(240deg) translateZ(250px); }

      .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
      }

      .home-main {
        width: min(980px, 92vw);
        margin: 0 auto;
        padding: 1.25rem 0 3rem 0;
      }

      .section-title {
        font-size: 0.95rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.65);
        margin: 1.6rem 0 0.9rem 0;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }

      /* Shimmer Loading Effect */
      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }

      .loading-shimmer {
        animation: shimmer 2s infinite;
        background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3), rgba(255,255,255,0.1));
        background-size: 1000px 100%;
      }

      .feed-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.9rem;
      }

      @media (max-width: 640px) {
        .feed-grid { grid-template-columns: 1fr; }
      }

      .feed-card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
        border-radius: 16px;
        padding: 1.5rem 1.25rem;
        display: block;
        cursor: pointer;
        user-select: none;
        position: relative;
        overflow: hidden;
      }

      .feed-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s;
      }

      .feed-card:hover::before {
        left: 100%;
      }

      .feed-card:hover {
        transform: translateY(-5px) scale(1.02);
        border-color: rgba(255, 255, 255, 0.25);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      }

      .feed-card.selected {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
        border-color: rgba(255, 255, 255, 0.3);
      }

      .feed-name {
        font-size: 1.1rem;
        font-weight: 800;
        margin: 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.95);
      }

      .feed-hint {
        margin: 0.4rem 0 0 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
      }

      .feed-radio {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .btn-primary,
      .btn-loading {
        border: none;
        width: 100%;
        margin-top: 1.1rem;
        padding: 1rem 1.25rem;
        border-radius: 14px;
        font-size: 1.05rem;
        font-weight: 900;
        letter-spacing: 0.3px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #ffffff, #e0e0e0);
        color: #000;
        transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
        cursor: pointer;
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.18);
      }

      /* Notification System */
      .notification {
        position: fixed;
        bottom: 30px;
        right: 20px;
        background: rgba(255, 0, 0, 0.9);
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        font-weight: 600;
        z-index: 999;
        animation: slideInUp 0.5s ease-out;
        box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        display: none;
      }

      .notification.show {
        display: block;
      }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Button loading fill animation */
      .btn-loading {
        background-color: #000;
        color: #fff;
        position: relative;
        overflow: hidden;
        cursor: progress;
      }
      .btn-loading > span {
        position: relative;
        z-index: 2;
      }
      .btn-loading::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 100%;
        background-color: #fff;
        z-index: 1;
      }
      .btn-loading.btn-animate::after {
        animation: fillFromLeft 5s linear forwards;
      }
      @keyframes fillFromLeft {
        from { width: 0%; }
        to { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="home">
      <header class="home-header">
        <h1 class="home-title">AI CHRONICAL</h1>
        <p class="home-subtitle">AI-powered news stories with image + voice summaries</p>
      </header>

      <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
          <div class="carousel-item">
            <img
              src="https://th.bing.com/th/id/OIP.n5BulOa9EeyETqSrO8rBhwHaNK?rs=1&pid=ImgDetMain"
              alt="News preview 1"
              loading="lazy"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1531966662811-c6501e46eda6?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&w=1000&q=80"
              alt="News preview 2"
              loading="lazy"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://cdn.wallpapersafari.com/53/68/XVAbeq.jpg"
              alt="News preview 3"
              loading="lazy"
            />
          </div>
        </div>
      </div>

      <main class="home-main">
        <div class="section-title">Choose a feed to generate</div>

        <form id="generatorForm" action="/process" method="post" novalidate>
          <div class="feed-grid">
            {% for feed in rss_feeds %}
            <label class="feed-card" data-feed-card>
              <input type="radio" name="feed" value="{{ loop.index }}" class="feed-radio" required />
              <p class="feed-name">{{ feed.name }}</p>
              <p class="feed-hint">Tap to select</p>
            </label>
            {% endfor %}
          </div>

          <button type="submit" disabled id="submitBtn" class="btn-primary">
            <span>Generate stories</span>
          </button>
        </form>
      </main>

      <div id="notification" class="notification"></div>
    </div>

    <script>
      // Notification System
      function showNotification(message, duration = 3000) {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.classList.add('show');
        setTimeout(() => {
          notification.classList.remove('show');
        }, duration);
      }

      // Check for cache stats on page load
      window.addEventListener('load', () => {
        fetch('/api/cache_stats')
          .then(res => res.json())
          .then(data => {
            if (data.cached_articles > 10) {
              showNotification('✨ Fresh stories ready! Duplicates filtered.', 2000);
            }
          })
          .catch(err => console.log('Cache stats unavailable'));
      });

      document.addEventListener("DOMContentLoaded", function () {
        const carouselTrack = document.getElementById("carouselTrack");
        let currentRotation = 0;
        let startX = null;
        const swipeThreshold = 50;

        setInterval(() => {
          currentRotation -= 120;
          carouselTrack.style.transform = `rotateY(${currentRotation}deg)`;
        }, 3000);

        carouselTrack.addEventListener("touchstart", (e) => {
          startX = e.touches[0].clientX;
        });

        carouselTrack.addEventListener("touchend", (e) => {
          const endX = e.changedTouches[0].clientX;
          const diffX = endX - startX;
          if (Math.abs(diffX) > swipeThreshold) {
            currentRotation += diffX > 0 ? 120 : -120;
            carouselTrack.style.transform = `rotateY(${currentRotation}deg)`;
          }
          startX = null;
        });
      });

      const form = document.getElementById("generatorForm");
      const submitBtn = document.getElementById("submitBtn");
      const cards = Array.from(document.querySelectorAll("[data-feed-card]"));

      document.querySelectorAll('input[type="radio"]').forEach((input) => {
        input.addEventListener("change", () => {
          submitBtn.disabled = false;
          cards.forEach((c) => c.classList.remove("selected"));
          const card = input.closest("[data-feed-card]");
          if (card) card.classList.add("selected");
        });
      });

      form.addEventListener("submit", (e) => {
        if (!form.checkValidity()) return;
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.classList.remove("btn-primary");
        submitBtn.classList.add("btn-loading", "btn-animate");
        submitBtn.querySelector("span").textContent = "Generating...";

        showNotification('🔄 Fetching fresh stories...', 5000);

        setTimeout(() => form.submit(), 5100);
      });
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}')
          .then(() => console.log("SW Registered"));
      }
    </script>
  </body>
</html>
