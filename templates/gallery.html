<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Gallery - AI Chronical</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ff0000">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        button {
            min-height: 50px;
            min-width: 50px;
            touch-action: manipulation;
        }

        /* Header */
        .gallery-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
            padding: clamp(0.5rem, 2vw, 0.8rem) clamp(1rem, 5vw, 2rem);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .gallery-header h1 {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #ddd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin: 0;
            line-height: 1.2;
        }

        .gallery-header p {
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: #bbb;
            margin-top: clamp(0.25rem, 1vw, 0.5rem);
            letter-spacing: 0.5px;
            margin: clamp(0.25rem, 1vw, 0.5rem) 0 0 0;
        }

        /* Main Container */
        .gallery-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 5rem 0 calc(env(safe-area-inset-bottom) + 1.5rem) 0;
            margin: 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem);
        }

        /* Reels Container */
        .reelsContainer {
            min-height: calc(100vh - 5.5rem);
            width: clamp(280px, 90vw, 450px);
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-padding-top: 1rem;
            scroll-behavior: smooth;
            gap: 0;
            padding: 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            overscroll-behavior: contain;
        }

        .reelsContainer::-webkit-scrollbar {
            display: none;
        }

        /* Reel Item */
        .reel {
            min-height: calc(100vh - 5.5rem);
            width: 100%;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            animation: slideUp 0.5s ease-out;
        }

        .reel img {
            max-width: 100%;
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 0;
            will-change: transform;
            animation: zoom 15s linear infinite;
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 30;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6666);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Floating Controls */
        .floating-controls {
            position: absolute;
            right: 16px;
            bottom: 120px;
            z-index: 35;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-btn {
            min-height: 50px;
            min-width: 50px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        /* Text Overlay on Image */
        .reel-text-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 25;
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.95) 0%,
                rgba(0,0,0,0.8) 30%,
                rgba(0,0,0,0.4) 60%,
                rgba(0,0,0,0.1) 100%
            );
            padding: clamp(1.5rem, 6vw, 4rem) clamp(1rem, 4vw, 2rem);
            color: white;
            text-align: center;
            min-height: clamp(120px, 30vw, 200px);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
        }

        .reel-text-overlay h2 {
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: 800;
            margin: 0 0 clamp(0.6rem, 2.5vw, 1rem) 0;
            line-height: 1.2;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .reel-text-overlay p {
            font-size: clamp(1rem, 3.8vw, 1.2rem);
            margin: 0;
            color: #e8e8e8;
            line-height: 1.5;
            letter-spacing: 0.3px;
            max-height: 4em;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Play Button */
        .play-icon {
            position: absolute;
            left: 16px;
            top: 16px;
            z-index: 10;
            width: 48px;
            height: 48px;
            font-size: clamp(18px, 5vw, 24px);
            color: #fff;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .play-icon:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.1) 100%);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .play-icon:active {
            transform: scale(0.95);
        }

        /* Load More Container */
        .load-more-container {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 1rem);
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            width: auto;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .load-more-button {
            padding: clamp(12px, 2.5vw, 16px) clamp(24px, 5vw, 36px);
            border-radius: 12px;
            background: linear-gradient(135deg, #5b7cfa 0%, #4c63d2 100%);
            color: #fff;
            font-weight: 700;
            font-size: clamp(0.9rem, 2vw, 1rem);
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(91, 124, 250, 0.3);
            letter-spacing: 0.5px;
        }

        .load-more-button::before {
            content: '⬇';
            margin-right: 0.6rem;
            display: inline-block;
        }

        .load-more-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255,255,255,0.25);
        }

        .load-more-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .load-more-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #666;
        }

        /* Fresh Feed Notification */
        .feed-notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(0,255,100,0.9), rgba(0,200,100,0.9));
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            z-index: 999;
            animation: slideDown 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(0,255,100,0.3);
            backdrop-filter: blur(10px);
            display: none;
        }

        .feed-notification.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Loading skeleton */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .skeleton-reel {
            animation: shimmer 2s infinite;
            background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            background-size: 1000px 100%;
            min-height: 100vh;
            border-radius: 0;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            margin-bottom: 0.5rem;
            color: #ccc;
        }

        .empty-state p {
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            color: #777;
        }

        /* Loading Spinner */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tablet Responsiveness */
        @media (max-width: 1024px) {
            .reelsContainer {
                width: clamp(300px, 85vw, 400px);
            }

            .reel {
                min-height: calc(100vh - 140px);
            }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .gallery-header {
                padding: clamp(0.5rem, 2vw, 1rem) clamp(0.75rem, 3vw, 1.5rem);
            }

            .gallery-header h1 {
                font-size: clamp(1.2rem, 5vw, 1.6rem);
            }

            .gallery-header p {
                font-size: clamp(0.75rem, 2vw, 0.95rem);
            }

            .gallery-wrapper {
                margin-top: 55px;
            }

            .reelsContainer {
                min-height: calc(100vh - 110px);
                width: 95vw;
                max-width: 450px;
                gap: 0;
                padding: 0.5rem 0;
            }

            .reel {
                min-height: calc(100vh - 130px);
                border-radius: 14px;
            }

            .reel-text-overlay {
                padding: clamp(1rem, 5vw, 2.2rem);
                min-height: clamp(70px, 22vw, 140px);
            }

            .reel-text-overlay h2 {
                font-size: clamp(1rem, 4vw, 1.4rem);
                margin-bottom: clamp(0.4rem, 2vw, 0.8rem);
            }

            .reel-text-overlay p {
                font-size: clamp(0.95rem, 3.2vw, 1.1rem);
            }

            .play-icon {
                width: 45px;
                height: 45px;
                font-size: 18px;
                left: 14px;
                top: 14px;
            }

            .load-more-button {
                padding: 12px 24px;
                font-size: 0.9rem;
                border-radius: 10px;
            }

            .load-more-container {
                bottom: 1.2rem;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .gallery-header {
                padding: 0.6rem 1rem;
            }

            .gallery-header h1 {
                font-size: 1.3rem;
                letter-spacing: 0.5px;
            }

            .gallery-header p {
                font-size: 0.8rem;
            }

            .reelsContainer {
                width: 98vw;
                min-height: calc(100vh - 110px);
                gap: 0.4rem;
            }

            .reel {
                min-height: calc(100vh - 130px);
                border-radius: 12px;
            }

            .reel-text-overlay {
                padding: 1rem;
            }

            .reel-text-overlay h2 {
                font-size: 1rem;
                margin-bottom: 0.4rem;
            }

            .reel-text-overlay p {
                font-size: 0.9rem;
            }

            .play-icon {
                width: 42px;
                height: 42px;
                font-size: 16px;
                left: 10px;
                top: 10px;
            }

            .load-more-button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }

            .load-more-container {
                bottom: 1rem;
            }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            .reel,
            .play-icon,
            .load-more-button {
                animation: none !important;
                transition: none !important;
            }
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #000;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="gallery-header">
        <h1>📰 AI CHRONICAL</h1>
        <p>AI-Powered News Stories</p>
    </header>

    <!-- Fresh Feed Notification -->
    <div id="feedNotification" class="feed-notification"></div>

    <!-- Main Gallery -->
    <div class="gallery-wrapper">
        <div class="reelsContainer" id="reelsContainer">
            <!-- Images will be loaded here -->
            <div class="empty-state">
                <div class="empty-state-icon">📸</div>
                <h2>Loading Stories...</h2>
                <p>Generating AI news summaries</p>
            </div>
        </div>
    </div>

    <!-- Load More Button -->
    <div class="load-more-container">
        <button id="loadMoreButton" class="load-more-button" onclick="loadMoreImages()">Load More Stories</button>
    </div>

    <script>
        console.log('gallery.html script start');
        let audioPlaying = null;
        let imageFiles = {{ image_files|tojson }};
        console.log('imageFiles on load:', imageFiles);
        let displayedImageCount = 0;
        const imagesPerLoadInitial = 3;
        const imagesPerLoadMore = 3;
        const reelsContainer = document.getElementById('reelsContainer');
        const loadMoreButton = document.getElementById('loadMoreButton');
        const rss_url = "{{ rss_url }}";
        let totalProcessedCount = {{ processed_count }};
        console.log('totalProcessedCount on load:', totalProcessedCount);

        // Notification System
        function showFeedNotification(message, duration = 3000) {
            const notification = document.getElementById('feedNotification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, duration);
        }

        // Clear empty state when first image loads
        function clearEmptyState() {
            const emptyState = reelsContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
        }

        function playAudio(filename) {
            if (audioPlaying) {
                audioPlaying.pause();
                audioPlaying.currentTime = 0;
                resetProgress(audioPlaying.dataset.filename);
            }
            let audioSrc = `{{ url_for('static', filename='images/') }}${filename}.mp3`;
            audioPlaying = new Audio(audioSrc);
            audioPlaying.dataset.filename = filename;
            audioPlaying.addEventListener('timeupdate', updateProgress);
            audioPlaying.addEventListener('ended', () => {
                resetProgress(filename);
                audioPlaying = null;
            });
            audioPlaying.play().catch(err => console.error('Audio play error:', err));
            
            // Update play button
            updatePlayButtons(filename);
        }

        function pauseCurrentAudio() {
            if (audioPlaying) {
                audioPlaying.pause();
                resetProgress(audioPlaying.dataset.filename);
                audioPlaying = null;
                updatePlayButtons(null);
            }
        }

        function updateProgress() {
            if (audioPlaying) {
                const progress = (audioPlaying.currentTime / audioPlaying.duration) * 100;
                const progressFill = document.getElementById(`progress-${audioPlaying.dataset.filename}`);
                if (progressFill) {
                    progressFill.style.width = `${progress}%`;
                }
            }
        }

        function resetProgress(filename) {
            const progressFill = document.getElementById(`progress-${filename}`);
            if (progressFill) {
                progressFill.style.width = '0%';
            }
        }

        function updatePlayButtons(playingFilename) {
            document.querySelectorAll('.play-btn').forEach(btn => {
                const audioFile = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                btn.textContent = audioFile === playingFilename ? '⏸' : '▶';
            });
        }

        function downloadStory(imageFile, audioFile) {
            const link = document.createElement('a');
            link.href = `{{ url_for('static', filename='images/') }}${imageFile}`;
            link.download = imageFile;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function toggleLike(audioFile) {
            console.log('Liked:', audioFile);
        }

        function shareStory(audioFile) {
            if (navigator.share) {
                navigator.share({
                    title: 'AI Chronical Story',
                    text: 'Check out this AI-generated news story!',
                    url: window.location.href
                });
            } else {
                console.log('Share not available');
            }
        }

        function loadMoreImages() {
            loadMoreButton.textContent = 'Loading...';
            loadMoreButton.disabled = true;
            showFeedNotification('🔄 Fetching fresh stories...', 5000);
            
            fetch(`/load_more_images?rss_url=${encodeURIComponent(rss_url)}`)
                .then(response => response.json())
                .then(data => {
                    console.log('load_more_images response data:', data);
                    if (data.image_files && data.image_files.length > 0) {
                        imageFiles = imageFiles.concat(data.image_files);
                        totalProcessedCount = data.processed_count;
                        loadImagesToGallery(imagesPerLoadMore);
                        showFeedNotification('✨ Fresh Feed Updated! Non-duplicate stories loaded.', 3000);
                    } else {
                        showFeedNotification('No more fresh stories available.', 2000);
                    }
                    loadMoreButton.textContent = 'Load More Stories';
                    loadMoreButton.disabled = false;
                    updateLoadMoreButtonVisibility();
                })
                .catch(error => {
                    console.error("Error loading more images:", error);
                    showFeedNotification('⚠️ Failed to load more stories.', 2000);
                    loadMoreButton.textContent = 'Load More Stories';
                    loadMoreButton.disabled = false;
                });
        }

        function loadImagesToGallery(count) {
            console.log('loadImagesToGallery called with count:', count);
            console.log('Current imageFiles:', imageFiles);
            clearEmptyState();
            
            for (let i = 0; i < count; i++) {
                if (displayedImageCount < imageFiles.length) {
                    const fileData = imageFiles[displayedImageCount];
                    console.log('Processing fileData:', fileData, 'type:', typeof fileData);
                    
                    // Handle both string (filename) and object (filename + text) formats
                    let filename, text;
                    if (typeof fileData === 'string') {
                        filename = fileData;
                        text = 'Story details';
                    } else if (typeof fileData === 'object' && fileData !== null) {
                        filename = fileData.filename || fileData;
                        text = fileData.text || 'Story details';
                    } else {
                        displayedImageCount++;
                        continue;
                    }
                    
                    console.log('Adding reel for:', filename, 'text:', text);
                    
                    const reelDiv = document.createElement('div');
                    reelDiv.classList.add('reel');
                    const audioFile = filename.replace('.jpg', '');
                    const safeText = text.replace(/"/g, '&quot;');
                    
                    reelDiv.innerHTML = `
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-${audioFile}"></div>
                        </div>
                        <img src="{{ url_for('static', filename='images/') }}${filename}" 
                             alt="Story image" 
                             class="reel-image"
                             loading="lazy">
                        <div class="floating-controls">
                            <button class="control-btn play-btn" onclick="playAudio('${audioFile}')">▶</button>
                            <button class="control-btn" onclick="toggleLike('${audioFile}')">❤️</button>
                            <button class="control-btn" onclick="downloadStory('${filename}', '${audioFile}')">⬇</button>
                        </div>
                        <div class="reel-text-overlay">
                            <p>${safeText}</p>
                        </div>
                    `;
                    reelsContainer.appendChild(reelDiv);
                    displayedImageCount++;
                } else {
                    console.log('No more images to display');
                    break;
                }
            }
            updateLoadMoreButtonVisibility();
        }

        function updateLoadMoreButtonVisibility() {
            console.log('updateLoadMoreButtonVisibility:', {displayedImageCount, totalProcessedCount, length: imageFiles.length});

            if (imageFiles && imageFiles.length > 0) {
                loadMoreButton.style.display = 'block';
            } else {
                loadMoreButton.style.display = 'none';
            }
        }

        window.addEventListener('load', () => {
            loadImagesToGallery(imagesPerLoadInitial);
            setTimeout(() => {
                showFeedNotification('🎬 Fresh Feed Ready - All duplicates filtered out!', 3000);
            }, 1000);
        });
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}')
          .then(() => console.log("SW Registered"));
      }
    </script>
</body>
</html>
